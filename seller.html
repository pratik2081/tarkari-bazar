<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ff6b6b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tarkari Bazar">
    <meta name="mobile-web-app-capable" content="yes">
    <title>tarkari bazar - Seller Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg width='192' height='192' viewBox='0 0 192 192' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='192' height='192' fill='%23ff6b6b' rx='24'/%3E%3Ctext x='96' y='110' font-family='Arial, sans-serif' font-size='80' font-weight='bold' text-anchor='middle' fill='white'%3E🥕%3C/text%3E%3C/svg%3E">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html"><h2><i class="fas fa-shopping-bag"></i> tarkari bazar</h2></a>
            </div>
            <nav class="nav">
                <a href="index.html">Shop</a>
                <a href="seller.html" class="active">Sell</a>
                <a href="tracking.html">Track Order</a>
            </nav>
            <div class="user-actions">
                <button id="loginBtn">Login</button>
                <button id="registerBtn" style="display: none;">Register</button>
                <span id="userInfo" style="display: none;"></span>
                <button id="logoutBtn" style="display: none;">Logout</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Seller Dashboard -->
        <section class="seller-dashboard">
            <div class="container">
                <h2>Seller Dashboard</h2>
                <div class="dashboard-stats">
                    <div class="stat-card">
                        <h3>Total Products</h3>
                        <p id="totalProducts">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Sales</h3>
                        <p id="totalSales">PKR 0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Orders Today</h3>
                        <p id="ordersToday">0</p>
                    </div>
                </div>
                <form id="addProductForm" class="seller-form">
                    <h3>Add New Product</h3>
                    <input type="text" placeholder="Product Name" id="productName" required>
                    <input type="number" placeholder="Price (PKR)" id="productPrice" min="1" required>
                    <input type="file" id="productImage" accept="image/*">
                    <textarea placeholder="Description" id="productDesc"></textarea>
                    <button type="submit">List Product</button>
                </form>
                <div class="my-products">
                    <h3>My Products</h3>
                    <div id="myProducts" class="products-grid">
                        <!-- Seller's products -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="seller.js"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>

    <!-- Login Modal -->
    <div id="loginModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" id="closeLoginModal">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name">
                </div>
                <div class="form-group" id="phoneGroup" style="display: none;">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone">
                </div>
                <div class="form-group" id="roleGroup" style="display: none;">
                    <label for="role">Role:</label>
                    <select id="role">
                        <option value="customer">Customer</option>
                        <option value="seller">Seller</option>
                        <option value="driver">Driver</option>
                    </select>
                </div>
                <div class="form-group" id="addressGroup" style="display: none;">
                    <label for="address">Address:</label>
                    <textarea id="address" rows="2"></textarea>
                </div>
                <button type="submit" id="authSubmitBtn">Login</button>
            </form>
            <p id="authToggle">Don't have an account? <a href="#" id="toggleAuthMode">Register here</a></p>
            <div id="authMessage"></div>
        </div>
    </div>
</body>
</html>
